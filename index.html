<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA-Calculator</title>
</head>
<body>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3eeee;

            display:flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            max-width: 450px;
            width: 90%;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table{
            width: 100%;
            text-align: left;
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover{
            background-color: #45a049;
        }

        @media (max-width: 600px){
            .container{
                margin: 20px;
            }
        }
        .password-box{
            position: relative;
        }
        .password-box span{
            position: absolute;
            right:10px;
            top: 13px;
            cursor: pointer;
        }
    </style>
    
    <div class="container">
        <h1>Hey User✌️</h1>
        <h2>Enter yours!</h2>
        <form>
            <table>
                <tr>
                    <td>Name: <input type = "text" id="username"></td>
                </tr>
                <tr>
                    <td>Email: <input type="email" id="email"></td>
                </tr>
                <tr>
                    <td>
                        Password: 
                        <div class="password-box">
                            <input type="password" id="password">
                            <span onclick="togglePassword()">👁️</span>
                        </div> 
                    </td>
                </tr>
            </table>
        </form>
        <button onclick="check()">LOGIN</button>
        <p id="msg"></p>
        <h5>Create a strong password.</h5>
    </div>
    <script>
        function togglePassword(){

            let pass = document.getElementById("password");

            if(pass.type === "password"){
                pass.type = "text";
            }
            else{
                pass.type = "password";
            }
        }


        function check(){
            const u=document.getElementById('username').value;
            const e=document.getElementById('email').value;
            const p=document.getElementById('password').value;
            const m=document.getElementById('msg');

            if (u.trim() === "" || e.trim() === "" || p.trim() === ""){
                m.innerText="Please fill all details";
                m.style.color = "red";
            }else{
                localStorage.setItem("loggedIn","true");
                localStorage.setItem("username",u);
                localStorage.setItem("email",e);
                m.innerText="Login successful!";
                m.style.color = "green";

                setTimeout(function(){
                    window.location.href = "dashboard.html";
                },2000);
            
            }

        }
    </script>

    

</body>
</html>
